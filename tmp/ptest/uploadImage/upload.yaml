input:
  petId:
    type: int
    in: path
    rules:
      - required
  additionalMetadata:
    type: string
    in: query
    rules: {  }
output:
  200:
    body:
      apiResponse: App\ApiResponse\ApiResponse
domain:
  class: App\UploadImage\UploadFile
  invocation: __invoke
