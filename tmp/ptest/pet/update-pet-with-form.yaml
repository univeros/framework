endpoint:
  method: POST
  path: '/pet/{petId}'
  summary: 'Updates a pet in the store with form data.'
  tags:
    - pet
input:
  petId:
    type: int
    in: path
    rules:
      - required
  name:
    type: string
    in: query
    rules: {  }
  status:
    type: string
    in: query
    rules: {  }
output:
  200:
    body:
      pet: App\Pet\Pet
domain:
  class: App\Pet\UpdatePetWithForm
  invocation: __invoke
