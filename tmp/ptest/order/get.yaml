endpoint:
  method: GET
  path: '/store/order/{orderId}'
  summary: 'Find purchase order by ID.'
  tags:
    - order
input:
  orderId:
    type: int
    in: path
    rules:
      - required
output:
  200:
    body:
      order: App\Order\Order
domain:
  class: App\Order\GetOrderById
  invocation: __invoke
