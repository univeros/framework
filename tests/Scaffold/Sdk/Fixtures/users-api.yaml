openapi: 3.1.0
info:
  title: Users API
  version: 1.0.0
paths:
  /users:
    post:
      operationId: createUser
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string }
                role: { $ref: '#/components/schemas/UserRole' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  user: { $ref: '#/components/schemas/User' }
        '422':
          description: Validation failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items: { type: string }
  /users/{id}:
    get:
      operationId: getUser
      summary: Fetch one user
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: Not found
components:
  schemas:
    UserRole:
      type: string
      enum: [admin, member, viewer]
    User:
      type: object
      required: [id, email, role]
      properties:
        id: { type: string }
        email: { type: string }
        role: { $ref: '#/components/schemas/UserRole' }
        created_at: { type: string, format: date-time }
