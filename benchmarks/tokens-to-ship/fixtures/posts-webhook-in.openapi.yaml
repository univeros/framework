openapi: 3.1.0
info:
  title: Stripe webhook receiver (inbound)
  version: 1.0.0
paths:
  /webhooks/stripe:
    post:
      operationId: receiveStripe
      summary: Receive Stripe webhook events
      # Inbound: verify HMAC-SHA256 over the raw body, enforce a 5m
      # timestamp window, and dedupe by event id for 24h. Field order
      # mirrors OpenApiEmitter::renderWebhook so openapi:roundtrip is clean.
      x-altair-webhook:
        direction: in
        signing: hmac-sha256
        secret_name: stripe
        header: Stripe-Signature
        dedupe_ttl: 24h
      x-altair-domain:
        class: App\Webhook\ReceiveStripe
        invocation: __invoke
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, type]
              properties:
                id: { type: string }
                type: { type: string }
      responses:
        '200':
          description: Accepted (or idempotently absorbed on replay)
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        '400':
          description: Missing or expired timestamp (replay window)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }
        '401':
          description: Signature verification failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }
